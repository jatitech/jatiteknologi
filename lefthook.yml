pre-commit:
  parallel: true
  jobs:
    - name: knip
      run: pnpm run knip

    - name: check
      glob: "*.astro"
      run: pnpm run check

    - name: lint
      glob: "*.{js,ts,jsx,tsx,astro}"
      run: pnpm exec oxlint --type-aware --fix {staged_files}
      stage_fixed: true

    - name: format
      glob: "*.{js,ts,jsx,tsx,astro,json,jsonc,css,md,yml,yaml}"
      run: pnpm exec oxfmt --write {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: build
      run: pnpm run build

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
