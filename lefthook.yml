pre-commit:
  parallel: true
  jobs:
    - name: check
      run: pnpm run astro check
    - name: build
      run: pnpm run build
      glob:
        - "src/**/*"
        - "astro.config.mjs"
        - "tsconfig.json"

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
